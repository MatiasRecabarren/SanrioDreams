{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>SanrioDreams - Panel de Pruebas</title>
  <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.css' %}" />
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap" rel="stylesheet" />
 <style>
    body {
      background-color: #fff0f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-container {
      max-width: 400px;
      margin: 120px auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #ff69b4;
    }

    .btn-login {
      background-color: #ff69b4;
      color: white;
      border: none;
    }

    .btn-login:hover {
      background-color: #ff1493;
    }

    .login-links {
      margin-top: 15px;
      text-align: center;
    }

    .login-links a {
      display: block;
      color: #ff69b4;
      margin-top: 8px;
      text-decoration: none;
    }

    .login-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  {% if messages %}
  <div class="container mt-4" style="max-width: 450px;">
    {% for message in messages %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
      </div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="test-container">
    <h2>SanrioDreams</h2>   
    <form method="POST" action="{% url 'cambio_rapido_test' %}">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="email"><b>1. Correo del usuario a modificar:</b></label>
        <input type="email" class="form-control" id="email" name="email" value="{{ email|default:'' }}" placeholder="ejemplo@correo.com" required>
      </div>
      
      <div class="form-group">
        <label for="contrasenna"><b>2. Nueva Contraseña a asignar:</b></label>
        <input type="text" class="form-control" id="contrasenna" name="contrasenna" placeholder="Ej: ClaveNueva123" required>
        <small class="text-muted">Debe tener mínimo 8 caracteres, 1 mayúscula y 1 número.</small>
      </div>
      
      <button type="submit" class="btn btn-test btn-block tuple-btn mt-4">⚡ Forzar Cambio de Contraseña Ahora</button>
    </form>
    
    <div class="text-center mt-3">
      <a href="{% url 'login' %}" style="color: #16a34a; font-size: 0.9rem;">Volver al Login habitual</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
